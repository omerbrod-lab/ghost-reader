name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install buildozer==1.5.0 cython==0.29.33
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git \
            libffi-dev libssl-dev \
            zlib1g-dev openjdk-17-jdk \
            unzip zip

      - name: Build APK
        run: |
          export ANDROIDSDK_ACCEPT_LICENSES=y
          yes | buildozer android debug 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Upload log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ghost-reader-apk
          path: bin/*.apk
