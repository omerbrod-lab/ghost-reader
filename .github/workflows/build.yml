name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1 | tee build.log

      - name: Find APK
        run: find / -name "*.apk" 2>/dev/null | tee apk_locations.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ghost-reader-apk
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: warn

      - name: Upload locations
        uses: actions/upload-artifact@v4
        with:
          name: apk-locations
          path: apk_locations.txt

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
